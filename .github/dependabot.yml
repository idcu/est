# Dependabot й…ЌзЅ®
# жџҐзњ‹ https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2

updates:
  # Maven дѕќиµ–ж›ґж–°
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "maven"
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions е·ҐдЅњжµЃж›ґж–?  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # npm дѕќиµ–ж›ґж–°пј€е‰Ќз«Їпј‰
  - package-ecosystem: "npm"
    directory: "/est-admin-ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "build"
      include: "scope"
