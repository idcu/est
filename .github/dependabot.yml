# Dependabot 配置
# 查看 https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2

updates:
  # Maven 依赖更新
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "maven"
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions 工作流更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # npm 依赖更新（前端）
  - package-ecosystem: "npm"
    directory: "/est-admin-ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "idcu"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "build"
      include: "scope"
