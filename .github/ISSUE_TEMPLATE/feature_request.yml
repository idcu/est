name: ✨ Feature Request
description: 为 EST 框架提出新功能建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您为 EST 框架提出新功能建议！我们非常重视社区的反馈。

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 您的功能请求是否与某个问题相关？请描述一下。
      placeholder: "我总是在使用 XXX 时感到困扰..."
    validations:
      required: true

  - type: textarea
    id: solution-description
    attributes:
      label: 解决方案
      description: 您希望看到什么样的功能实现？
      placeholder: "我希望有一个功能可以..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您考虑过其他替代解决方案吗？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对您来说有多重要？
      options:
        - "必须有（Critical）"
        - "应该有（Important）"
        - "可以有（Nice to have）"
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: 使用场景
      description: 请描述您将如何使用这个功能。提供具体的代码示例会更好。
      render: java

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息
      description: 还有其他相关的信息或截图吗？

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献
      description: 您是否愿意参与实现这个功能？
      options:
        - label: 我愿意提交 PR 来实现这个功能
        - label: 我可以帮助测试这个功能
