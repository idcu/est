name: 📚 Documentation
description: 文档改进请求或错误报告
title: "[Docs] "
labels: ["documentation", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您帮助我们改进 EST 框架的文档！

  - type: dropdown
    id: doc-type
    attributes:
      label: 文档类型
      description: 这是什么类型的文档问题？
      options:
        - "文档错误（内容不正确）"
        - "文档缺失（缺少重要内容）"
        - "文档改进（可以写得更清晰）"
        - "代码示例问题"
        - "其他"
    validations:
      required: true

  - type: input
    id: doc-location
    attributes:
      label: 文档位置
      description: 问题所在的文档路径或 URL
      placeholder: "例如: docs/ai/ai-coder-guide.md 或 README.md"

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请详细描述文档中的问题。
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 建议内容
      description: 您建议如何修改或补充？

  - type: checkboxes
    id: pr-contribution
    attributes:
      label: 贡献
      description: 您是否愿意提交 PR 来修复这个文档问题？
      options:
        - label: 我愿意提交 PR 来改进文档
