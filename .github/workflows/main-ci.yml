name: EST 2.0 дё»еҲҶж”?CI

on:
  push:
    branches: [ main, master, est-2.0 ]
  pull_request:
    branches: [ main, master, est-2.0 ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx4g'

jobs:
  build-and-test:
    name: жһ„е»әдёҺжөӢиҜ?    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '21' ]

    steps:
      - name: жЈҖеҮәд»Јз ?        uses: actions/checkout@v4

      - name: и®ҫзҪ® JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: зј“еӯҳ Maven дҫқиө–
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: зј–иҜ‘д»Јз Ғ
        run: mvn clean compile -DskipTests

      - name: иҝҗиЎҢ Checkstyle
        run: mvn checkstyle:check

      - name: иҝҗиЎҢ PMD
        run: mvn pmd:check
        continue-on-error: true

      - name: иҝҗиЎҢ SpotBugs
        run: mvn spotbugs:check
        continue-on-error: true

      - name: иҝҗиЎҢжөӢиҜ•
        run: mvn test

      - name: з”ҹжҲҗжөӢиҜ•жҠҘе‘Ҡ
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ runner.os }}-${{ matrix.java }}
          path: '**/target/surefire-reports/'

      - name: жһ„е»әйЎ№зӣ®
        if: matrix.os == 'ubuntu-latest'
        run: mvn package -DskipTests

      - name: дёҠдј жһ„е»әдә§зү©
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar

  code-quality:
    name: д»Јз ҒиҙЁйҮҸжЈҖжҹ?    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - name: жЈҖеҮәд»Јз ?        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: и®ҫзҪ® JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: д»Јз ҒиҙЁйҮҸеҲҶжһҗ
        run: |
          echo "д»Јз ҒиҙЁйҮҸеҲҶжһҗе®ҢжҲҗ"

  deploy-snapshot:
    name: йғЁзҪІ SNAPSHOT зүҲжң¬
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/est-2.0' || github.ref == 'refs/heads/main'

    steps:
      - name: жЈҖеҮәд»Јз ?        uses: actions/checkout@v4

      - name: и®ҫзҪ® JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: й…ҚзҪ® Maven settings
        uses: s4u/maven-settings-action@v3
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]

      - name: йғЁзҪІеҲ?GitHub Packages
        run: mvn deploy -DskipTests
