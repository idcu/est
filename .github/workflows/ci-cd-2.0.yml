name: EST 2.0 CI/CD Pipeline

on:
  push:
    branches: [ est-2.0 ]
  pull_request:
    branches: [ est-2.0 ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven (skip tests first)
      run: mvn clean compile -DskipTests

    - name: Run Checkstyle
      run: mvn checkstyle:check

    - name: Run Tests
      run: mvn test

    - name: Generate Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: '**/target/surefire-reports/'

    - name: Build Package
      run: mvn package -DskipTests

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/target/*.jar
          !**/target/*-sources.jar
          !**/target/*-javadoc.jar

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run SonarQube Scan (optional, if configured)
      if: false
      run: mvn sonar:sonar

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Dependency Check
      run: mvn dependency-check:check
      continue-on-error: true

    - name: Upload Dependency Check Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: '**/target/dependency-check-report.*'