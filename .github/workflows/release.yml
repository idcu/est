name: еЏ‘еёѓжµЃзЁ‹

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '21'

jobs:
  release:
    name: еЏ‘еёѓж–°з‰€жњ?    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: жЈЂе‡єд»Јз ?        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: и®ѕзЅ® JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: й…ЌзЅ® Maven settings
        uses: s4u/maven-settings-action@v3
        with:
          servers: |
            [{
              "id": "github",
              "username": "${{ github.actor }}",
              "password": "${{ secrets.GITHUB_TOKEN }}"
            }]

      - name: жћ„е»єйЎ№з›®
        run: mvn clean package -DskipTests

      - name: иЋ·еЏ–з‰€жњ¬еЏ?        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: е€›е»є GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: йѓЁзЅІе€?GitHub Packages
        run: mvn deploy -DskipTests
