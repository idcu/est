name: 清理陈旧的 Issues 和 PR

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 标记并关闭陈旧的 Issues 和 PR
        uses: actions/stale@v9
        with:
          stale-issue-message: '这个 Issue 已经 60 天没有活动了，将被标记为陈旧。如果在 7 天内没有进一步活动，它将被自动关闭。'
          stale-pr-message: '这个 Pull Request 已经 30 天没有活动了，将被标记为陈旧。如果在 7 天内没有进一步活动，它将被自动关闭。'
          stale-issue-label: 'no-issue-activity'
          stale-pr-label: 'no-pr-activity'
          days-before-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: 'enhancement,bug,documentation'
