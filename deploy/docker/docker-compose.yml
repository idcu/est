version: '3.8'

services:
  app:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: est-demo
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx2g -XX:+UseG1GC
      - APP_ENV=development
      - APP_NAME=est-demo
      - APP_VERSION=2.1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - est-network
    volumes:
      - ./logs:/opt/app/logs
      - ./config:/opt/app/config:ro

networks:
  est-network:
    driver: bridge
