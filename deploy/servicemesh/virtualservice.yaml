apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: est-web-app-vs
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/part-of: est-framework
spec:
  hosts:
  - "est-app.example.com"
  gateways:
  - est-gateway
  - mesh
  http:
  - name: "est-web-app-routes"
    match:
    - uri:
        prefix: "/"
    route:
    - destination:
        host: est-web-app-service
        port:
          number: 80
        subset: v1
      weight: 90
    - destination:
        host: est-web-app-service
        port:
          number: 80
        subset: v2
      weight: 10
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: "connect-failure,refused-stream,unavailable,cancelled,resource-exhausted,retriable-status-codes"
      retryRemoteLocalities: true
    corsPolicy:
      allowOrigins:
      - exact: "https://est-app.example.com"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - "*"
      maxAge: "24h"
    headers:
      request:
        add:
          X-Request-Id: $request_id
          X-Forwarded-For: $remote_addr
      response:
        add:
          X-Frame-Options: DENY
          X-Content-Type-Options: nosniff
          X-XSS-Protection: "1; mode=block"
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: est-web-app-internal-vs
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/part-of: est-framework
spec:
  hosts:
  - "est-web-app-service.est.svc.cluster.local"
  gateways:
  - mesh
  http:
  - name: "health-check"
    match:
    - uri:
        exact: "/health"
    route:
    - destination:
        host: est-web-app-service
        port:
          number: 80
    timeout: 5s
    retries:
      attempts: 1
  - name: "metrics"
    match:
    - uri:
        exact: "/metrics"
    route:
    - destination:
        host: est-web-app-service
        port:
          number: 80
    timeout: 10s
  - name: "api-routes"
    match:
    - uri:
        prefix: "/api"
    route:
    - destination:
        host: est-web-app-service
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 2
      perTryTimeout: 15s
