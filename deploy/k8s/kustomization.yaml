apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: est

commonLabels:
  app.kubernetes.io/part-of: est-framework
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - service.yaml
  - deployment.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml

configMapGenerator:
- name: est-web-app-config
  files:
    - application.properties=configmap.yaml
  options:
    disableNameSuffixHash: true

secretGenerator:
- name: est-web-app-secret
  literals:
    - db.user=est_user
    - db.password=change_this_password_in_production
  options:
    disableNameSuffixHash: true

images:
- name: est-web-app
  newName: est-web-app
  newTag: latest

replicas:
- name: est-web-app
  count: 3

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: est-web-app
    spec:
      template:
        spec:
          containers:
          - name: est-web-app
            image: est-web-app:latest
