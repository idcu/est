apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: est

commonLabels:
  app.kubernetes.io/part-of: est-framework
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - service.yaml
  - deployment.yaml
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml

images:
- name: est-demo
  newName: est-demo
  newTag: latest

replicas:
- name: est-demo
  count: 3
