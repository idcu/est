apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: est-web-app-role
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/instance: est-web-app
    app.kubernetes.io/version: "1.3.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: est-framework
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: est-web-app-rolebinding
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/instance: est-web-app
    app.kubernetes.io/version: "1.3.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: est-framework
subjects:
- kind: ServiceAccount
  name: est-web-app-sa
  namespace: est
roleRef:
  kind: Role
  name: est-web-app-role
  apiGroup: rbac.authorization.k8s.io
