apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: est-web-app-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: est-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: est-web-app-service
            port:
              number: 80
