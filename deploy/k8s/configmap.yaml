apiVersion: v1
kind: ConfigMap
metadata:
  name: est-web-app-config
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/instance: est-web-app
    app.kubernetes.io/version: "1.3.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: est-framework
data:
  app.env: "production"
  app.name: "est-web-app"
  app.version: "1.3.0"
  app.port: "8080"
  log.level: "INFO"
  log.format: "json"
  
  server.max-threads: "200"
  server.connection-timeout: "30000"
  server.idle-timeout: "60000"
  
  cache.enabled: "true"
  cache.type: "memory"
  cache.ttl: "3600"
  
  metrics.enabled: "true"
  metrics.port: "9090"
  metrics.path: "/metrics"
  
  healthcheck.path: "/health"
  healthcheck.interval: "30"
  
  application.properties: |
    # EST Framework Application Configuration
    app.name=est-web-app
    app.version=1.3.0
    app.env=production
    
    # Server Configuration
    server.port=8080
    server.host=0.0.0.0
    server.max-threads=200
    server.connection-timeout=30000
    server.idle-timeout=60000
    
    # Logging Configuration
    log.level=INFO
    log.format=json
    log.output=console
    
    # Cache Configuration
    cache.enabled=true
    cache.type=memory
    cache.ttl=3600
    cache.max-size=10000
    
    # Metrics Configuration
    metrics.enabled=true
    metrics.port=9090
    metrics.path=/metrics
    
    # Health Check Configuration
    healthcheck.enabled=true
    healthcheck.path=/health
    healthcheck.interval=30
    
    # Database Configuration (optional)
    db.enabled=false
    db.pool.size=10
    db.connection.timeout=30000
