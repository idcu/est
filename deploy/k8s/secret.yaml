apiVersion: v1
kind: Secret
metadata:
  name: est-web-app-secret
  namespace: est
  labels:
    app: est-web-app
    app.kubernetes.io/name: est-web-app
    app.kubernetes.io/instance: est-web-app
    app.kubernetes.io/version: "1.3.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: est-framework
type: Opaque
stringData:
  db.host: "postgresql-service:5432"
  db.user: "est_user"
  db.password: "change_this_password_in_production"
  db.name: "est_db"
  
  jwt.secret: "change_this_jwt_secret_in_production_use_a_strong_random_string"
  jwt.issuer: "est-framework"
  jwt.audience: "est-web-app"
  
  api.key: "change_this_api_key_in_production"
  
  encryption.key: "change_this_encryption_key_in_production_32_bytes_long"
