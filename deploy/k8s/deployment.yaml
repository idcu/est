apiVersion: apps/v1
kind: Deployment
metadata:
  name: est-demo
  namespace: est
  labels:
    app: est-demo
    app.kubernetes.io/name: est-demo
    app.kubernetes.io/instance: est-demo
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: est-framework
    app.kubernetes.io/managed-by: kustomize
  annotations:
    description: "EST Framework Demo Application"
spec:
  replicas: 3
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: est-demo
  template:
    metadata:
      labels:
        app: est-demo
        app.kubernetes.io/name: est-demo
        app.kubernetes.io/instance: est-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: est-demo-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: est-demo
        image: est-demo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: est-demo-config
              key: app.env
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: est-demo-config
              key: app.name
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: est-demo-config
              key: app.version
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: est-demo-config
              key: log.level
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: est-demo-secret
              key: db.host
              optional: true
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: est-demo-secret
              key: db.user
              optional: true
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: est-demo-secret
              key: db.password
              optional: true
        envFrom:
        - configMapRef:
            name: est-demo-config
            optional: true
        - secretRef:
            name: est-demo-secret
            optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        startupProbe:
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 10
          failureThreshold: 30
          successThreshold: 1
        volumeMounts:
        - name: config-volume
          mountPath: /opt/app/config
          readOnly: true
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /opt/app/logs
      volumes:
      - name: config-volume
        configMap:
          name: est-demo-config
          items:
          - key: application.properties
            path: application.properties
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - est-demo
              topologyKey: kubernetes.io/hostname
      tolerations:
      - key: "node-role.kubernetes.io/worker"
        operator: "Exists"
        effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/os: linux
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
